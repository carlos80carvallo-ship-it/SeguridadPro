<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Flash - CarlosC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a1128; color: white; font-family: sans-serif; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; padding: 20px; }
        .admin-panel { background: #1a202c; border: 2px solid #f6e05e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .resultado-card { background: #171923; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .circulo { width: 50px; height: 50px; background: #ed8936; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app">
        <h1 class="text-2xl font-bold text-yellow-500 mb-4 text-center">PANEL DE CARLOSC</h1>
        
        <div class="admin-panel">
            <input type="text" id="valor" placeholder="Número o Animal" class="w-full p-3 mb-2 text-black rounded font-bold text-center uppercase">
            <button onclick="publicar()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded">PUBLICAR RESULTADO</button>
        </div>

        <div class="resultado-card">
            <span>SORTEO 09:00 AM</span>
            <div id="res-09" class="circulo">--</div>
        </div>
    </div>

    <script>
        function publicar() {
            let v = document.getElementById('valor').value;
            if(v) {
                document.getElementById('res-09').innerText = v;
                document.getElementById('valor').value = "";
            }
        }
    </script>
</body>
</html>
