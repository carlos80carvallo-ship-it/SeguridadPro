<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Flash Pro - CarlosC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') no-repeat center center fixed; 
            background-size: cover;
            color: white; margin: 0; display: flex; justify-content: center;
        }
        .main-container {
            width: 100%; max-width: 500px; 
            background-color: rgba(10, 15, 29, 0.97); 
            min-height: 100vh; padding: 20px; box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-gold { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 20px; border: 1px solid rgba(241, 196, 15, 0.1); margin-bottom: 12px; padding: 15px; transition: all 0.3s ease; }
        
        /* Círculo especial para Guácharo (Naranja Fuego) */
        .circle-guacharo { 
            width: 55px; height: 55px; 
            background: linear-gradient(135deg, #f97316, #ea580c); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 1.3rem; 
            box-shadow: 0 0 20px rgba(234, 88, 12, 0.5);
            border: 2px solid #fdba74;
        }
        
        .logo-box { background: #f1c40f; color: black; padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 1.5rem; cursor: pointer; }
        .live-pulse { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        
        #admin-panel { display: none; background: #0f172a; padding: 20px; border-radius: 15px; border: 2px solid #f97316; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="main-container">
    <header class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-3">
            <div class="logo-box" onclick="checkAdmin()">LF</div>
            <div>
                <h1 class="text-3xl font-bold italic leading-none tracking-tighter">LOTTO</h1>
                <div class="flex items-center gap-1">
                    <span class="live-pulse"></span>
                    <span class="text-green-500 text-[10px] font-bold uppercase tracking-widest">En Vivo</span>
                    <span class="text-orange-500 text-xl font-bold italic ml-1">FLASH</span>
                </div>
            </div>
        </div>
        <div id="reloj" class="text-orange-500 font-bold text-xl tabular-nums">--:--:--</div>
    </header>

    <div class="flex justify-between items-center mb-6">
        <p id="fecha-hoy" class="text-xl font-bold text-gray-500 tracking-tight">--/--/----</p>
        <div class="flex items-center gap-2 bg-gray-800/50 px-4 py-2 rounded-full cursor-pointer border border-white/5" onclick="darLike()">
            <i id="heart-icon" class="fas fa-heart text-red-500"></i>
            <span id="like-count" class="font-bold text-white text-sm">842</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="relative">
            <select id="loteria-view" class="w-full bg-gray-800 text-white p-3 rounded-xl border border-orange-500/50 font-bold appearance-none outline-none text-sm" onchange="actualizarModo()">
                <option value="lotto">Lotto Activo</option>
                <option value="granjita">La Granjita</option>
                <option value="rey">Lotto Rey</option>
                <option value="guacharo" selected>Guácharo Activo</option>
            </select>
        </div>
        <input type="date" id="busqueda-fecha" class="bg-gray-800 text-white p-3 rounded-xl border border-orange-500/50 font-bold text-sm outline-none">
    </div>

    <div id="admin-panel">
        <h3 class="text-center font-bold text-orange-500 mb-4 text-sm uppercase tracking-widest">Consola Administrador</h3>
        <div class="space-y-3">
            <select id="admin-hora" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-white/10">
                <option value="08">08:00 AM</option><option value="09">09:00 AM</option>
                <option value="10">10:00 AM</option><option value="11">11:00 AM</option>
                <option value="12">12:00 PM</option><option value="01">01:00 PM</option>
                <option value="04">04:00 PM</option><option value="05">05:00 PM</option>
                <option value="06">06:00 PM</option><option value="07">07:00 PM</option>
            </select>
            <input type="text" id="admin-res" placeholder="Ej: 40 o ALACRÁN" class="w-full p-3 rounded-lg bg-gray-900 text-white text-center font-bold border border-white/10 uppercase">
            <button onclick="publicar()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">PUBLICAR RESULTADO</button>
        </div>
    </div>

    <div id="sorteos-lista" class="space-y-3">
        </div>

    <div class="mt-10 text-center pb-12">
        <p class="text-[9px] text-gray-600 tracking-[8px] mb-1">PLATAFORMA OFICIAL</p>
        <h2 class="text-2xl font-bold tracking-[4px] text-white/90">CARLOSC</h2>
        <p class="text-[10px] text-orange-500 font-bold mt-2">INNOVACIÓN 2026</p>
    </div>
</div>

<script>
    function clock() {
        const d = new Date();
        document.getElementById('reloj').innerText = d.toLocaleTimeString('en-US', { hour12: false });
        document.getElementById('fecha-hoy').innerText = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(clock, 1000); clock();

    const horas = ["08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "04:00 PM", "05:00 PM", "06:00 PM", "07:00 PM"];
    const lista = document.getElementById('sorteos-lista');

    function render() {
        lista.innerHTML = '';
        horas.forEach(h => {
            const id = h.split(':')[0];
            lista.innerHTML += `
                <div class="card-gold flex justify-between items-center group">
                    <div>
                        <p class="text-[10px] text-gray-500 font-bold">SORTEO</p>
                        <h3 class="text-lg font-bold text-white/90">${h}</h3>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-orange-500 font-bold text-[11px] animate-pulse" id="txt-${id}">ESPERANDO...</span>
                        <div id="val-${id}" class="circle-guacharo">--</div>
                        <i class="fab fa-whatsapp text-green-500 text-xl opacity-80 hover:opacity-100 cursor-pointer"></i>
                    </div>
                </div>`;
        });
    }
    render();

    function darLike() {
        let c = parseInt(document.getElementById('like-count').innerText);
        document.getElementById('like-count').innerText = c + 1;
        document.getElementById('heart-icon').classList.add('scale-150');
        setTimeout(() => document.getElementById('heart-icon').classList.remove('scale-150'), 200);
    }

    function checkAdmin() {
        window.adminClicks = (window.adminClicks || 0) + 1;
        if(window.adminClicks === 3) {
            const p = prompt("Sistema CarlosC - Clave:");
            if(p === "19Bc*.Ks*9") document.getElementById('admin-panel').style.display = 'block';
            window.adminClicks = 0;
        }
    }

    function publicar() {
        const h = document.getElementById('admin-hora').value;
        const r = document.getElementById('admin-res').value;
        if(!r) return alert("Escribe un resultado");
        document.getElementById('val-'+h).innerText = r;
        document.getElementById('txt-'+h).innerText = "CONFIRMADO";
        document.getElementById('txt-'+h).classList.remove('animate-pulse');
        document.getElementById('admin-res').value = '';
    }
</script>
</body>
</html>
