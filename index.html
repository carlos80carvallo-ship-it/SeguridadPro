<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Flash - CarlosC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0a0f1d; color: white; display: flex; justify-content: center; margin: 0; }
        .app-container { width: 100%; max-width: 450px; background: #0f172a; min-height: 100vh; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .circle { width: 45px; height: 45px; background: #ea580c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .btn-admin { background: #f1c40f; color: black; font-weight: bold; padding: 10px; width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="flex justify-between items-center mb-6">
            <div class="text-2xl font-bold text-yellow-500">LF</div>
            <div id="reloj" class="text-xl font-mono">00:00:00</div>
        </div>

        <div class="flex justify-between items-center mb-6 bg-gray-800 p-3 rounded-xl">
            <span class="text-gray-400 font-bold">3/3/2026</span>
            <button onclick="darLike()" class="flex items-center gap-2">
                <i class="fas fa-heart text-red-500"></i>
                <span id="contador">450</span>
            </button>
        </div>

        <div class="bg-gray-900 p-4 rounded-xl border-2 border-orange-500 mb-6">
            <p class="text-orange-500 font-bold text-center mb-2">PANEL CARLOSC</p>
            <input type="text" id="res-val" placeholder="Número" class="w-full p-2 rounded mb-2 text-black">
            <button onclick="actualizar()" class="btn-admin">PUBLICAR RESULTADO</button>
        </div>

        <div id="lista-sorteos">
            <div class="card">
                <span>08:00 AM</span>
                <div class="flex items-center gap-3">
                    <span id="txt-08" class="text-xs text-orange-500">ESPERANDO</span>
                    <div id="ball-08" class="circle">--</div>
                </div>
            </div>
            </div>
    </div>

    <script>
        // Reloj
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Función de Like
        function darLike() {
            let c = document.getElementById('contador');
            c.innerText = parseInt(c.innerText) + 1;
        }

        // Función Publicar
        function actualizar() {
            let val = document.getElementById('res-val').value;
            if(val) {
                document.getElementById('ball-08').innerText = val;
                document.getElementById('txt-08').innerText = "OK";
            }
        }
    </script>
</body>
</html>
