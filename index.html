<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Flash Pro - CarlosC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0a0f1d; 
            color: white; margin: 0; display: flex; justify-content: center;
        }
        .main-container { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; background: rgba(15, 23, 42, 0.95); }
        .card-gold { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .circle-res { 
            width: 50px; height: 50px; background: linear-gradient(135deg, #f97316, #ea580c); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 15px rgba(234, 88, 12, 0.4);
        }
        #admin-panel { display: none; background: #0f172a; padding: 15px; border: 2px solid #f97316; border-radius: 15px; margin-bottom: 20px; }
        .logo-btn { background: #f1c40f; color: black; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

<div class="main-container">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="logo-btn" onclick="activarAdmin()">LF</div>
            <div>
                <h1 class="text-2xl font-bold italic">LOTTO <span class="text-orange-500">FLASH</span></h1>
                <p class="text-green-500 text-[10px] font-bold uppercase tracking-widest">● En Vivo</p>
            </div>
        </div>
        <div id="reloj" class="text-orange-500 font-bold text-lg">00:00:00</div>
    </header>

    <div class="flex justify-between items-center mb-4">
        <div class="text-gray-400 font-bold" id="fecha">--/--/----</div>
        <div class="bg-gray-800 px-4 py-1 rounded-full flex items-center gap-2 cursor-pointer" onclick="darLike()">
            <i class="fas fa-heart text-red-500"></i>
            <span id="likes">452</span>
        </div>
    </div>

    <div id="admin-panel">
        <p class="text-center text-orange-500 font-bold mb-2">MODO ADMINISTRADOR</p>
        <input type="text" id="input-res" placeholder="Resultado" class="w-full p-2 rounded bg-gray-700 mb-2 text-center uppercase font-bold">
        <select id="input-hora" class="w-full p-2 rounded bg-gray-700 mb-2">
            <option value="08">08:00 AM</option><option value="09">09:00 AM</option>
            <option value="10">10:00 AM</option><option value="01">01:00 PM</option>
            <option value="04">04:00 PM</option><option value="07">07:00 PM</option>
        </select>
        <button onclick="subir()" class="w-full bg-orange-600 py-2 rounded font-bold">PUBLICAR</button>
    </div>

    <div id="lista" class="space-y-3">
        </div>
</div>

<script>
    // Reloj y Fecha
    setInterval(() => {
        const d = new Date();
        document.getElementById('reloj').innerText = d.toLocaleTimeString();
        document.getElementById('fecha').innerText = d.toLocaleDateString();
    }, 1000);

    // Generar Lista
    const horas = ["08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "04:00 PM", "05:00 PM", "06:00 PM", "07:00 PM"];
    const lista = document.getElementById('lista');
    horas.forEach(h => {
        const id = h.split(':')[0];
        lista.innerHTML += `
            <div class="card-gold flex justify-between items-center">
                <span class="font-bold text-gray-400">${h}</span>
                <div class="flex items-center gap-3">
                    <div id="res-${id}" class="circle-res">--</div>
                    <i class="fab fa-whatsapp text-green-500 text-xl"></i>
                </div>
            </div>`;
    });

    // Función Admin con contador visual en consola para probar
    let toques = 0;
    function activarAdmin() {
        toques++;
        if (toques === 3) {
            let p = prompt("Introduce Clave CarlosC:");
            if (p === "19Bc*.Ks*9") {
                document.getElementById('admin-panel').style.display = 'block';
            }
            toques = 0;
        }
    }

    function subir() {
        const h = document.getElementById('input-hora').value;
        const r = document.getElementById('input-res').value;
        if(r) document.getElementById('res-'+h).innerText = r;
    }

    function darLike() {
        let n = parseInt(document.getElementById('likes').innerText);
        document.getElementById('likes').innerText = n + 1;
    }
</script>
</body>
</html>
